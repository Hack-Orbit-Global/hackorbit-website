<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none" role="img" aria-label="Hack Orbit Logo">
  <!-- Red planet -->
  <circle cx="120" cy="90" r="44" fill="#E03030"/>
  <!-- Green orbital ring (ellipse) -->
  <ellipse cx="120" cy="90" rx="72" ry="28" stroke="#22C55E" stroke-width="5" fill="none"/>
  <!-- Satellite dot -->
  <circle cx="192" cy="90" r="9" fill="#22C55E"/>
  <!-- HACK text -->
  <text x="120" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="900" fill="#2563EB" text-anchor="middle" letter-spacing="2">HACK</text>
  <!-- ORBIT text -->
  <text x="120" y="212" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="900" fill="#2563EB" text-anchor="middle" letter-spacing="2">ORBIT</text>
</svg>
